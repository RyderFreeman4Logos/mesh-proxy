name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            # Target glibc 2.17 (CentOS 7 era) for broad compatibility
            zigbuild_target: x86_64-unknown-linux-gnu.2.17
            archive_name: mesh-proxy-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.17
            archive_name: mesh-proxy-aarch64-unknown-linux-gnu.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            zigbuild_target: x86_64-apple-darwin
            archive_name: mesh-proxy-x86_64-apple-darwin.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            zigbuild_target: aarch64-apple-darwin
            archive_name: mesh-proxy-aarch64-apple-darwin.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Build release binary
        run: cargo zigbuild --release --target "${{ matrix.zigbuild_target }}"

      - name: Package release archive
        run: |
          tar -czf "${{ matrix.archive_name }}" \
            -C "target/${{ matrix.target }}/release" \
            mesh-proxy

      - name: Upload release archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload archives to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
